<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TmartFashion — Upgrading</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #07080d;
            color: #e8e8e8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* animated gradient background */

        .bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 110, 196, 0.12), transparent 50%),
                radial-gradient(circle at 80% 60%, rgba(80, 160, 255, 0.12), transparent 50%),
                radial-gradient(circle at 50% 90%, rgba(255, 180, 70, 0.10), transparent 60%);
            animation: moveBg 20s ease-in-out infinite alternate;
        }

        @keyframes moveBg {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(-6%, -8%);
            }
        }

        /* container */

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
            padding: 40px;
            animation: fadeUp 1.2s ease forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LOGO */

        .logo {
            font-size: 68px;
            font-weight: 700;
            letter-spacing: -1px;

            background: linear-gradient(90deg,
                    #ff6ec4,
                    #7873f5,
                    #4facfe,
                    #ff9a44,
                    #ff6ec4);

            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: gradientMove 6s linear infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0%
            }

            100% {
                background-position: 300%
            }
        }

        /* tagline */

        .tagline {
            margin-top: 12px;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #8e8e8e;
        }

        /* divider */

        .divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, #ff6ec4, #4facfe);
            margin: 35px auto;
            border-radius: 3px;
        }

        /* title */

        h1 {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* text */

        .subtitle {
            font-size: 18px;
            line-height: 1.7;
            color: #bdbdbd;
            max-width: 600px;
            margin: auto;
        }

        /* loader */

        .loader {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .loader span {
            width: 10px;
            height: 10px;
            border-radius: 50%;

            background: linear-gradient(45deg, #ff6ec4, #4facfe);

            animation: bounce 1.2s infinite ease-in-out;
        }

        .loader span:nth-child(2) {
            animation-delay: .2s;
        }

        .loader span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(.5);
                opacity: .4;
            }

            40% {
                transform: scale(1.3);
                opacity: 1;
            }

        }

        /* footer */

        footer {
            position: absolute;
            bottom: 25px;
            font-size: 13px;
            color: #6a6a6a;
            letter-spacing: .5px;
        }

        @media(max-width:640px) {

            .logo {
                font-size: 44px;
            }

            h1 {
                font-size: 26px;
            }

            .subtitle {
                font-size: 16px;
            }

        }
    </style>
</head>

<body>

    <div class="bg"></div>

    <div class="container">

        <div class="logo">TmartFashion</div>

        <div class="tagline">New Fashion Experience</div>

        <div class="divider"></div>

        <h1>We're Upgrading Our Store</h1>

        <p class="subtitle">
            Our store is temporarily offline while we upgrade the experience,
            improve performance, and prepare new collections.
            <br><br>
            We'll be back very soon.
        </p>

        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

    <footer>
        © 2026 TmartFashion
    </footer>

</body>

</html>
